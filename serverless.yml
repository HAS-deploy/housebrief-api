service: housebrief-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  profile: dr
  stage: ${opt:stage, 'prod'}
  memorySize: 512
  timeout: 20
  environment:
    STAGE: ${self:provider.stage}
    TABLE: ${self:service}-${self:provider.stage}
    UPLOAD_BUCKET: ${self:service}-${self:provider.stage}-uploads
    CLAUDE_SECRET_ID: housebrief/anthropic-api-key
    ADMIN_TOKENS_SECRET_ID: housebrief/admin-tokens
    USER_TOKEN_SECRET: ${ssm:/housebrief/prod/user-token-secret}
    NEW_SUBMISSION_TOPIC_ARN:
      Ref: NewSubmissionTopic
    ADMIN_BASE_URL: ${self:custom.adminBaseUrl.${self:provider.stage}, ''}

custom:
  adminBaseUrl:
    prod: https://housebrief-admin.vercel.app
    staging: https://housebrief-admin-staging.vercel.app
  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-HouseBrief-Token
      allowedMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - Fn::GetAtt: [SubmissionsTable, Arn]
            - Fn::Join: ["/", [Fn::GetAtt: [SubmissionsTable, Arn], "index/*"]]
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - Fn::Join: ["/", [Fn::GetAtt: [UploadBucket, Arn], "*"]]
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - arn:aws:secretsmanager:${self:provider.region}:*:secret:housebrief/*
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - Ref: NewSubmissionTopic
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            # async fire from submit -> analyzeAndNotify
            - Fn::Sub: "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${self:provider.stage}-analyzeAndNotify"

functions:
  # --- consumer ---
  submit:
    handler: src/handlers/submit.handler
    environment:
      NOTIFY_FN_NAME: ${self:service}-${self:provider.stage}-analyzeAndNotify
    events:
      - httpApi:
          method: POST
          path: /v1/submissions

  # Async worker fired by submit. Runs Claude analysis, stores result,
  # updates submission scores, and publishes to SNS for email alert.
  analyzeAndNotify:
    handler: src/handlers/analyzeAndNotify.handler
    timeout: 60
    environment:
      SNS_TOPIC_ARN:
        Ref: NewSubmissionTopic

  listMine:
    handler: src/handlers/listMine.handler
    events:
      - httpApi:
          method: GET
          path: /v1/submissions/mine

  getOne:
    handler: src/handlers/getOne.handler
    events:
      - httpApi:
          method: GET
          path: /v1/submissions/{id}

  uploadUrl:
    handler: src/handlers/uploadUrl.handler
    events:
      - httpApi:
          method: POST
          path: /v1/submissions/{id}/upload-url

  stateCheck:
    handler: src/handlers/stateCheck.handler
    events:
      - httpApi:
          method: POST
          path: /v1/state-check

  deleteAccount:
    handler: src/handlers/deleteAccount.handler
    events:
      - httpApi:
          method: DELETE
          path: /v1/account

  # --- admin ---
  adminList:
    handler: src/handlers/adminList.handler
    events:
      - httpApi:
          method: GET
          path: /admin/v1/queue

  adminDetail:
    handler: src/handlers/adminDetail.handler
    events:
      - httpApi:
          method: GET
          path: /admin/v1/submissions/{id}

  adminUpdateStatus:
    handler: src/handlers/adminUpdateStatus.handler
    events:
      - httpApi:
          method: PATCH
          path: /admin/v1/submissions/{id}

  adminAnalyze:
    handler: src/handlers/adminAnalyze.handler
    timeout: 30
    events:
      - httpApi:
          method: POST
          path: /admin/v1/submissions/{id}/analyze

resources:
  Resources:
    SubmissionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
          - AttributeName: gsi1pk
            AttributeType: S
          - AttributeName: gsi1sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: gsi1pk
                KeyType: HASH
              - AttributeName: gsi1sk
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true

    # Email alert channel for new submissions. Subscription confirmation
    # must be clicked in the target inbox once after first deploy.
    NewSubmissionTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-${self:provider.stage}-new-submissions
        DisplayName: HouseBrief New Submissions

    NewSubmissionEmailSub:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn:
          Ref: NewSubmissionTopic
        Protocol: email
        Endpoint: mcmurtrey.a@gmail.com

    UploadBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.UPLOAD_BUCKET}
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        LifecycleConfiguration:
          Rules:
            - Id: expire-stale-uploads
              Status: Enabled
              ExpirationInDays: 180
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ["*"]
              AllowedMethods: [PUT]
              AllowedHeaders: ["*"]
              MaxAge: 3000

  Outputs:
    ApiUrl:
      Value:
        Fn::Sub: "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
      Export:
        Name: ${self:service}-${self:provider.stage}-api-url
